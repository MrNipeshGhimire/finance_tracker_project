<a href="{% url 'loans:detail' loan.id %}"
   class="block p-4 rounded-xl shadow-sm bg-white">

    <div class="flex justify-between">
        <div>
            <p class="font-medium">{{ loan.person_name }}</p>
            <p class="text-xs text-gray-500">{{ loan.start_date }}</p>
        </div>

        <div class="text-right">
            <p class="{% if loan.loan_type == 'lend' %}text-green-500{% else %}text-red-500{% endif %}">
                Rs. {{ loan.remaining_amount }}
            </p>

            <span class="text-xs px-2 py-1 rounded-full
                {% if loan.is_overdue %}
                    bg-red-100 text-red-600
                {% elif loan.status == 'settled' %}
                    bg-green-100 text-green-600
                {% else %}
                    bg-gray-100 text-gray-600
                {% endif %}">
                {% if loan.is_overdue %}
                    Overdue
                {% else %}
                    {{ loan.status }}
                {% endif %}
            </span>
        </div>
    </div>

    <!-- Progress -->
    <div class="mt-2">
        <div class="w-full bg-gray-200 h-2 rounded-full">
            <div class="h-2 rounded-full bg-green-500"
                 style="width: {{ loan.progress_percentage }}%;">
            </div>
        </div>
    </div>

</a>
